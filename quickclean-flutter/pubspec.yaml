name: quickclean_flutter
description: A production-ready cleaning service booking app.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.0.0
  
  # UI & Icons
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1
  
  # Payments
  razorpay_flutter: ^1.3.5
  
  # Utils
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  http: ^1.2.1
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  lucide_icons: ^0.257.0
  google_sign_in: ^6.2.2
  google_maps_flutter: ^2.2.8
  cached_network_image: ^3.4.0
  flutter_polyline_points: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
